version: "2"

run:
  timeout: 5m

linters:
  default: standard
  enable:
    - bodyclose
    - errorlint
    - goconst
    - gocritic
    - gocyclo
    - gosec
    - misspell
    - nakedret
    - noctx
    - nolintlint
    - unconvert
    - unparam
    - revive
    - whitespace

  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
        - style
    gocyclo:
      min-complexity: 15
    goconst:
      min-len: 2
      min-occurrences: 3
    nakedret:
      max-func-lines: 30
    nolintlint:
      require-explanation: true
      require-specific: true

  exclusions:
    presets:
      - comments
      - std-error-handling
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - goconst
          - gosec

formatters:
  enable:
    - goimports
    - gofumpt
  settings:
    goimports:
      local-prefixes:
        - github.com/hirosassa/nimoji
